<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Globe background -->
  <circle cx="16" cy="16" r="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.8"/>

  <!-- Meridians -->
  <ellipse cx="16" cy="16" rx="5" ry="13.2" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <ellipse cx="16" cy="16" rx="10" ry="13.2" stroke="#3B82F6" stroke-width="1" opacity="0.35"/>

  <!-- Parallels -->
  <line x1="2.5" y1="16" x2="29.5" y2="16" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <ellipse cx="16" cy="10.5" rx="12" ry="2.2" stroke="#3B82F6" stroke-width="1" opacity="0.4"/>
  <ellipse cx="16" cy="21.5" rx="12" ry="2.2" stroke="#3B82F6" stroke-width="1" opacity="0.4"/>

  <!-- Hexagonal grid accent (center) -->
  <polygon points="16,8 21,11 21,17 16,20 11,17 11,11" fill="#3B82F6" fill-opacity="0.15" stroke="#2563EB" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Inner hex detail -->
  <line x1="16" y1="8" x2="16" y2="20" stroke="#2563EB" stroke-width="0.8" opacity="0.5"/>
  <line x1="11" y1="14" x2="21" y2="14" stroke="#2563EB" stroke-width="0.8" opacity="0.5"/>
</svg>
